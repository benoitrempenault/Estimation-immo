<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimation Immobilière</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0e;
    --surface: #161714;
    --surface2: #1e1f1c;
    --border: #2a2b27;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #e8e6df;
    --text-muted: #7a7970;
    --user-bg: #1a2415;
    --user-border: #2d4020;
    --bot-bg: #1a1a17;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), #8a6520);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #5a9e52;
    margin-left: auto;
    box-shadow: 0 0 8px #5a9e5280;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Progress */
  .progress-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.6s ease;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 720px;
    animation: fadeSlide 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .bot .avatar {
    background: linear-gradient(135deg, var(--gold), #7a5015);
  }

  .user .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.875rem;
    line-height: 1.6;
    max-width: 580px;
  }

  .bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #c8e0b8;
  }

  .step-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 500;
  }

  /* Typing indicator */
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Fiche synthèse */
  .fiche {
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 8px;
    font-size: 0.82rem;
  }

  .fiche-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fiche-section {
    margin-bottom: 10px;
  }

  .fiche-section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .fiche p {
    color: var(--text);
    line-height: 1.7;
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 760px;
    margin: 0 auto;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    padding: 11px 15px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    min-height: 44px;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--gold);
  }

  textarea::placeholder { color: var(--text-muted); }

  button#sendBtn {
    width: 44px; height: 44px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--gold), #8a6520);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
    font-size: 16px;
  }

  button#sendBtn:hover { transform: scale(1.06); }
  button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .hint {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🏛</div>
  <div>
    <div class="header-title">Estimation Immobilière</div>
    <div class="header-sub">Assistant Agent — Collecte de données</div>
  </div>
  <div class="status-dot"></div>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div id="chat"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Votre réponse…" rows="1"></textarea>
    <button id="sendBtn">➤</button>
  </div>
  <div class="hint">Appuyez sur Entrée pour envoyer · Maj+Entrée pour un saut de ligne</div>
</div>

<script>
const SYSTEM_PROMPT = `Tu es un assistant spécialisé en estimation immobilière, travaillant aux côtés d'un agent immobilier professionnel. Ton rôle est de conduire un entretien structuré et rigoureux avec un propriétaire ou prospect afin de collecter toutes les informations nécessaires à l'établissement d'une estimation précise de son bien.

INSTRUCTIONS IMPORTANTES :
- Adopte un ton professionnel et formel tout au long de la conversation. Vouvoie systématiquement l'interlocuteur.
- Pose UNE SEULE question à la fois, de manière fluide et naturelle.
- Reformule brièvement la réponse précédente pour confirmer la compréhension avant de passer à la suivante.
- Indique discrètement en début de message l'étape en cours sous la forme [Étape X/6 — Nom].
- Suis rigoureusement ces 6 étapes :

ÉTAPE 1 — IDENTIFICATION DU BIEN
Accueille l'interlocuteur, présente-toi brièvement, puis demande :
- La nature du bien (maison, appartement ou terrain)
- L'adresse ou la ville/quartier
- Le contexte de la démarche (vente, succession, refinancement, curiosité…)

ÉTAPE 2 — LOCALISATION & ENVIRONNEMENT
- Situation géographique (centre-ville, périphérie, rural)
- Accessibilité (transports, commerces, écoles)
- Nuisances ou atouts (vue, calme, bruit, vis-à-vis)

ÉTAPE 3 — SURFACE & COMPOSITION
Pour maison/appartement : surface habitable, nombre de pièces/chambres/SDB, annexes (cave, garage, parking), terrain si maison.
Pour terrain : surface, constructibilité, viabilisation, topographie.

ÉTAPE 4 — ÉTAT GÉNÉRAL & TRAVAUX
- Année de construction
- Travaux déjà réalisés et date
- Travaux à prévoir
- État général perçu
- DPE et classe énergétique si disponible

ÉTAPE 5 — ÉQUIPEMENTS & PRESTATIONS
Pour maison/appartement : chauffage, cuisine équipée, terrasse/balcon, double vitrage, domotique.
Pour appartement : étage, ascenseur, charges de copropriété, état parties communes.
Pour terrain : orientation, servitudes, contraintes PLU.

ÉTAPE 6 — INFORMATIONS COMPLÉMENTAIRES
- Occupation du bien (propriétaire, locataire, vacant)
- Éléments juridiques (indivision, hypothèque, bail)
- Prix souhaité par le propriétaire (sans influence sur l'estimation)
- Délai envisagé pour la vente

CLÔTURE :
Une fois toutes les étapes complètes, génère une fiche synthétique structurée en Markdown avec toutes les données collectées, bien organisées par catégorie. Indique clairement les informations manquantes ou à vérifier. Termine en remerciant l'interlocuteur et en indiquant que l'agent prendra le relais pour l'analyse comparative et l'estimation définitive.

Suis l'avancement de la conversation. Quand tu génères la fiche finale, commence-la par "### FICHE_SYNTHESE ###" pour que l'interface puisse la détecter.`;

let history = [];
let step = 0;
const totalSteps = 6;
let isWaiting = false;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const progress = document.getElementById('progress');

function setProgress(val) {
  progress.style.width = Math.min(val, 100) + '%';
}

function addMsg(role, text, stepLabel = null) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🏛' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (stepLabel && role === 'bot') {
    const lbl = document.createElement('div');
    lbl.className = 'step-label';
    lbl.textContent = stepLabel;
    bubble.appendChild(lbl);
  }

  // Check for fiche synthese
  if (text.includes('### FICHE_SYNTHESE ###')) {
    const parts = text.split('### FICHE_SYNTHESE ###');
    const intro = parts[0].trim();
    const ficheText = parts[1] ? parts[1].trim() : '';

    if (intro) {
      const p = document.createElement('p');
      p.textContent = intro;
      bubble.appendChild(p);
    }

    if (ficheText) {
      const fiche = document.createElement('div');
      fiche.className = 'fiche';

      const title = document.createElement('div');
      title.className = 'fiche-title';
      title.innerHTML = '📋 Fiche de synthèse — Estimation immobilière';
      fiche.appendChild(title);

      // Parse markdown sections
      const sections = ficheText.split(/\n(?=#{1,3} )/);
      sections.forEach(section => {
        const lines = section.split('\n').filter(l => l.trim());
        if (!lines.length) return;

        const sec = document.createElement('div');
        sec.className = 'fiche-section';

        const titleLine = lines[0].replace(/^#+\s*/, '');
        if (lines[0].startsWith('#')) {
          const t = document.createElement('div');
          t.className = 'fiche-section-title';
          t.textContent = titleLine;
          sec.appendChild(t);

          const content = document.createElement('p');
          content.innerHTML = lines.slice(1).map(l =>
            l.replace(/^\*\s*/, '• ').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          ).join('<br>');
          sec.appendChild(content);
        } else {
          const content = document.createElement('p');
          content.innerHTML = lines.map(l =>
            l.replace(/^\*\s*/, '• ').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          ).join('<br>');
          sec.appendChild(content);
        }
        fiche.appendChild(sec);
      });

      bubble.appendChild(fiche);
    }

    setProgress(100);
  } else {
    const p = document.createElement('p');
    p.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    bubble.appendChild(p);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🏛';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function extractStep(text) {
  const match = text.match(/\[Étape\s*(\d+)\/6[^\]]*\]/i);
  if (match) return parseInt(match[1]);
  return null;
}

function cleanText(text) {
  return text.replace(/\[Étape\s*\d+\/6[^\]]*\]\s*/gi, '').trim();
}

async function sendMessage(userText) {
  if (isWaiting) return;
  isWaiting = true;
  sendBtn.disabled = true;

  if (userText) {
    addMsg('user', userText);
    history.push({ role: 'user', content: userText });
  }

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || "Je suis désolé, une erreur s'est produite.";

    removeTyping();

    const detectedStep = extractStep(raw);
    if (detectedStep) {
      step = detectedStep;
      setProgress((step / totalSteps) * 95);
    }

    const stepLabel = detectedStep ? `Étape ${detectedStep} / ${totalSteps}` : null;
    const clean = cleanText(raw);

    addMsg('bot', clean, stepLabel);
    history.push({ role: 'assistant', content: raw });

  } catch (e) {
    removeTyping();
    addMsg('bot', "Une erreur de connexion s'est produite. Veuillez réessayer.");
  }

  isWaiting = false;
  sendBtn.disabled = false;
  input.focus();
}

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = input.value.trim();
    if (val && !isWaiting) {
      input.value = '';
      input.style.height = 'auto';
      sendMessage(val);
    }
  }
});

sendBtn.addEventListener('click', () => {
  const val = input.value.trim();
  if (val && !isWaiting) {
    input.value = '';
    input.style.height = 'auto';
    sendMessage(val);
  }
});

// Init
setProgress(5);
sendMessage('');
</script>
</body>
</html>
